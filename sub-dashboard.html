<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouTuber Sub Count Leaderboard</title>
  <style>
    body { font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:#0f1724; color:#e6eef8; margin:0; padding:24px; }
    h1 { margin:0 0 12px 0; font-size:20px; }
    .note { font-size:12px; color:#9fb0d6; margin-bottom:12px; }
    table { width:100%; border-collapse:collapse; background:#071028; box-shadow:0 4px 18px rgba(2,6,23,0.6); }
    th, td { padding:12px 10px; text-align:left; border-bottom:1px solid rgba(255,255,255,0.03); }
    th { color:#a9c2e6; font-weight:600; font-size:13px; }
    td.small { color:#9fb0d6; font-size:13px; width:140px; }
    .count { font-weight:700; color:#fff; }
    .muted { color:#7f9fc5; font-size:13px; }
    .status { font-size:13px; color:#9fb0d6; }
    .loading { opacity:0.7; font-style:italic; color:#7f9fc5; }
    #lastUpdated { margin-top:12px; color:#9fb0d6; font-size:13px; }
    .editor-note { margin:12px 0; padding:10px; background:#071733; border:1px solid rgba(255,255,255,0.02); font-size:13px; color:#a9c2e6; }
    pre.json-edit { background:#001028; color:#dbeeff; padding:10px; border-radius:6px; overflow:auto; font-size:13px; }
    @media (max-width:640px) {
      th, td { padding:10px 6px; }
    }
  </style>
</head>
<body>
  <h1>Multicraft YouTuber Sub-count Leaderboard</h1>
  <div class="note">Auto-refresh every 60s. Using hardcoded subscriber counts for reliability.</div>

  <!--
    EASY EDIT SPOT
    Edit the JSON below to change subscriber counts. Update the "subs" values and save the file.
    Keep the object shape: { "name": "ChannelName", "url": "https://www.youtube.com/@Handle", "subs": 12345 }
  -->
  <div class="editor-note">Edit subscriber counts here (JSON). Change the "subs" values, then save this HTML file on GitHub to update the leaderboard.</div>

  <script id="channels-data" type="application/json">
  [
    { "name": "XREALM", "url": "https://www.youtube.com/@XREALM", "subs": 22400 },
    { "name": "MultiC12", "url": "https://www.youtube.com/@MultiC12", "subs": 0 },
    { "name": "JBTheCrafter", "url": "https://www.youtube.com/@JBTHECRAFTER", "subs": 0 },
    { "name": "ItzStrawberry", "url": "https://www.youtube.com/@ItzStrawberry", "subs": 0 },
    { "name": "game1kyt", "url": "https://www.youtube.com/@game1kyt", "subs": 0 },
    { "name": "RishabhProGamingRPG", "url": "https://www.youtube.com/@RishabhProGamingRPG", "subs": 0 },
    { "name": "TimmyLoal", "url": "https://www.youtube.com/@TimmyLoal", "subs": 0 },
    { "name": "Verxsion", "url": "https://www.youtube.com/@Verxsion", "subs": 0 },
    { "name": "ChillPotatoYT", "url": "https://www.youtube.com/@ChillPotatoYT", "subs": 0 },
    { "name": "x9jm", "url": "https://www.youtube.com/@x9jm", "subs": 0 },
    { "name": "vorthexisyt", "url": "https://www.youtube.com/@vorthexisyt", "subs": 0 },
    { "name": "Prologozrock", "url": "https://www.youtube.com/@Prologozrock", "subs": 75 }
  ]
  </script>

  <table id="leaderboard" aria-live="polite">
    <thead>
      <tr>
        <th>#</th>
        <th>Channel</th>
        <th class="small">Handle</th>
        <th class="small">Subscribers</th>
        <th class="small">Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div id="lastUpdated" aria-hidden="false"></div>

<script>
/* Channels to track — now loaded from the editable JSON block above */
let channels = [];
try {
  const raw = document.getElementById('channels-data').textContent;
  channels = JSON.parse(raw);
} catch (e) {
  console.error('Failed to parse channels-data JSON:', e);
  channels = [];
}

/* Helper: convert strings like "1.23M" "12.3K" "12,345" to numeric */
function parseCountString(s) {
  if (!s) return 0;
  s = String(s).trim();
  s = s.replace(/subscribers?/i,'').trim();
  const firstToken = (s.split(/·|·|•|, /)[0] || s).trim();
  let token = firstToken.replace(/\s+/g,'');
  token = token.replace(/,/g,'');
  const suffix = token[token.length-1].toUpperCase();
  if (suffix === 'K' || suffix === 'M' || suffix === 'B') {
    const num = parseFloat(token.slice(0,-1));
    if (isNaN(num)) return 0;
    if (suffix === 'K') return Math.round(num * 1e3);
    if (suffix === 'M') return Math.round(num * 1e6);
    if (suffix === 'B') return Math.round(num * 1e9);
  }
  const n = parseInt(token.replace(/[^\d]/g,''), 10);
  return isNaN(n) ? 0 : n;
}

/* Render the leaderboard table */
function renderTable(rows) {
  const tbody = document.querySelector('#leaderboard tbody');
  tbody.innerHTML = '';
  rows.forEach((r, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${idx+1}</td>
      <td><a href="${r.url}" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none;">${r.name}</a></td>
      <td class="small muted">${(r.url.split('/').pop()||'')}</td>
      <td class="small"><span class="count">${r.display || '—'}</span></td>
      <td class="small status">${r.status || ''}</td>
    `;
    tbody.appendChild(tr);
  });
}

/* Main refresh logic: use the subs from the channels array, format and render */
function refreshAll() {
  const start = Date.now();
  const results = channels.map(ch => {
    const subsNum = (typeof ch.subs === 'number') ? ch.subs : parseCountString(ch.subs);
    const out = { 
      name: ch.name, 
      url: ch.url, 
      display: formatCompact(subsNum), 
      handle: (ch.url.split('/').pop()||''), 
      status: 'ok',
      value: subsNum
    };
    return out;
  });

  // Sort by numeric value (desc)
  results.sort((a,b) => (b.value || 0) - (a.value || 0));

  renderTable(results);

  const elapsed = ((Date.now()-start)/1000).toFixed(1);
  document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleString()} — loaded ${results.length} channels in ${elapsed}s`;
}

/* Format numeric into compact (e.g., 1.2M) */
function formatCompact(n) {
  if (n >= 1e9) return (n/1e9).toFixed(2).replace(/\.00$/,'') + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2).replace(/\.00$/,'') + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K';
  return String(n);
}

/* Kick off initial load and schedule refresh every 60s */
refreshAll();
setInterval(refreshAll, 60_000);

</script>
</body>
</html>
