<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouTuber Sub Count Leaderboard</title>
  <style>
    body { font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:#0f1724; color:#e6eef8; margin:0; padding:24px; }
    h1 { margin:0 0 12px 0; font-size:20px; }
    .note { font-size:12px; color:#9fb0d6; margin-bottom:12px; }
    table { width:100%; border-collapse:collapse; background:#071028; box-shadow:0 4px 18px rgba(2,6,23,0.6); }
    th, td { padding:12px 10px; text-align:left; border-bottom:1px solid rgba(255,255,255,0.03); }
    th { color:#a9c2e6; font-weight:600; font-size:13px; }
    td.small { color:#9fb0d6; font-size:13px; width:140px; }
    .count { font-weight:700; color:#fff; }
    .muted { color:#7f9fc5; font-size:13px; }
    .status { font-size:13px; color:#9fb0d6; }
    .loading { opacity:0.7; font-style:italic; color:#7f9fc5; }
    #lastUpdated { margin-top:12px; color:#9fb0d6; font-size:13px; }
    @media (max-width:640px) {
      th, td { padding:10px 6px; }
    }
  </style>
</head>
<body>
  <h1>Multicraft YouTuber Sub-count Leaderboard</h1>
  <div class="note">Auto-refresh every 60s. No Google API key used — uses a public CORS proxy (may have rate limits).</div>

  <table id="leaderboard" aria-live="polite">
    <thead>
      <tr>
        <th>#</th>
        <th>Channel</th>
        <th class="small">Handle</th>
        <th class="small">Subscribers</th>
        <th class="small">Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div id="lastUpdated" aria-hidden="false"></div>

<script>
/* Channels to track */
const channels = [
  { name: 'XREALM', url: 'https://www.youtube.com/@XREALM' },
  { name: 'MultiC12', url: 'https://www.youtube.com/@MultiC12' },
  { name: 'JBTheCrafter', url: 'https://www.youtube.com/@JBTHECRAFTER' },
  { name: 'ItzStrawberry', url: 'https://www.youtube.com/@ItzStrawberry' },
  { name: 'game1kyt', url: 'https://www.youtube.com/@game1kyt' },
  { name: 'RishabhProGamingRPG', url: 'https://www.youtube.com/@RishabhProGamingRPG' },
  { name: 'TimmyLoal', url: 'https://www.youtube.com/@TimmyLoal' },
  { name: 'Verxsion', url: 'https://www.youtube.com/@Verxsion' },
  { name: 'ChillPotatoYT', url: 'https://www.youtube.com/@ChillPotatoYT' }
];

/* Public CORS proxy (no API key). You can replace with another proxy if desired. */
const CORS_PROXY = 'https://api.allorigins.win/raw?url=';

/* Helper: convert strings like "1.23M" "12.3K" "12,345" to numeric */
function parseCountString(s) {
  if (!s) return 0;
  s = String(s).trim();
  // remove trailing words like "subscribers" or "subscribers," etc.
  s = s.replace(/subscribers?/i,'').trim();
  // sometimes strings contain extra text: "1.2M subscribers · 123 videos" -> take first token that looks like count
  const firstToken = (s.split(/·|·|•|, /)[0] || s).trim();
  // Accept patterns like "1.2M", "1,234", "1 234", "1234"
  let token = firstToken.replace(/\s+/g,'');
  token = token.replace(/,/g,'');
  const suffix = token[token.length-1].toUpperCase();
  if (suffix === 'K' || suffix === 'M' || suffix === 'B') {
    const num = parseFloat(token.slice(0,-1));
    if (isNaN(num)) return 0;
    if (suffix === 'K') return Math.round(num * 1e3);
    if (suffix === 'M') return Math.round(num * 1e6);
    if (suffix === 'B') return Math.round(num * 1e9);
  }
  // plain number
  const n = parseInt(token.replace(/[^\d]/g,''), 10);
  return isNaN(n) ? 0 : n;
}

/* Extract subscriber count text from the YouTube about page HTML.
   Tries multiple patterns used by YouTube's embedded JSON. */
function extractSubscriberText(html) {
  if (!html) return null;
  // Look for "subscriberCountText":{"simpleText":"1.23M subscribers"}
  let m = html.match(/"subscriberCountText"\s*:\s*\{\s*[^}]*"simpleText"\s*:\s*"([^"]+)"/i);
  if (m) return m[1];

  // Look for accessibility label variant: "subscriberCountText":{"accessibility":{"accessibilityData":{"label":"1,234 subscribers"}}}
  m = html.match(/"subscriberCountText"\s*:\s*\{\s*[^}]*"accessibility"\s*:\s*\{\s*[^}]*"label"\s*:\s*"([^"]+)"/i);
  if (m) return m[1];

  // Fallback: find "subscribers" in meta description content
  m = html.match(/<meta\s+name=["']description["']\s+content=["']([^"']+)["']/i);
  if (m) {
    const desc = m[1];
    const m2 = desc.match(/([0-9.,\s]+(?:[KkMmBb])?)\s+subscribers?/i);
    if (m2) return m2[0];
  }

  // Fallback: search for any "<span ...>1.23M subscribers</span>" occurrences
  m = html.match(/([0-9][0-9.,]*\s*[KMkmbMB]?)(?:\s*subscribers?)/i);
  if (m) return m[0];

  return null;
}

/* Fetch subscriber text for a channel using the proxy and extract it */
async function fetchSubscriberText(channelUrl) {
  try {
    const aboutUrl = channelUrl.replace(/\/+$/,'') + '/about';
    const resp = await fetch(CORS_PROXY + encodeURIComponent(aboutUrl), {cache: 'no-store'});
    if (!resp.ok) throw new Error('Proxy fetch failed: ' + resp.status);
    const text = await resp.text();
    const subText = extractSubscriberText(text);
    return subText;
  } catch (err) {
    console.warn('fetchSubscriberText error for', channelUrl, err);
    throw err;
  }
}

/* Render the leaderboard table */
function renderTable(rows) {
  const tbody = document.querySelector('#leaderboard tbody');
  tbody.innerHTML = '';
  rows.forEach((r, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${idx+1}</td>
      <td><a href="${r.url}" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none;">${r.name}</a></td>
      <td class="small muted">${r.handle || ''}</td>
      <td class="small"><span class="count">${r.display || '—'}</span></td>
      <td class="small status">${r.status || ''}</td>
    `;
    tbody.appendChild(tr);
  });
}

/* Main refresh logic: fetch all counts, sort, render */
async function refreshAll() {
  const start = Date.now();
  const results = await Promise.all(channels.map(async ch => {
    const out = { name: ch.name, url: ch.url, display: '…', handle: (ch.url.split('/').pop()||''), status: 'loading' };
    try {
      const raw = await fetchSubscriberText(ch.url);
      if (!raw) {
        out.display = 'N/A';
        out.value = 0;
        out.status = 'not found';
      } else {
        // clean up raw string
        let cleaned = raw.replace(/\s+subscribers?/i,'').trim();
        out.display = raw.replace(/subscribers/i,'').trim();
        out.value = parseCountString(raw);
        if (!out.value) {
          // sometimes raw is like "1,234 subscribers · 10 videos" - take first number
          out.value = parseCountString(cleaned);
        }
        out.status = 'ok';
      }
    } catch (err) {
      out.display = 'error';
      out.value = 0;
      out.status = 'fetch error';
    }
    return out;
  }));

  // Sort by numeric value (desc). Unknowns go to bottom.
  results.sort((a,b) => (b.value || 0) - (a.value || 0));

  // Format display: if display missing and value present, format nicely
  results.forEach(r => {
    if ((!r.display || r.display === '…') && r.value) {
      r.display = formatCompact(r.value);
    } else if (r.display && !/subscribers/i.test(r.display)) {
      // keep as-is
    }
  });

  renderTable(results);

  const elapsed = ((Date.now()-start)/1000).toFixed(1);
  document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleString()} — fetched ${results.length} channels in ${elapsed}s`;
}

/* Format numeric into compact (e.g., 1.2M) */
function formatCompact(n) {
  if (n >= 1e9) return (n/1e9).toFixed(2).replace(/\.00$/,'') + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2).replace(/\.00$/,'') + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K';
  return String(n);
}

/* Kick off initial load and schedule refresh every 60s */
refreshAll();
setInterval(refreshAll, 60_000);

</script>
</body>
</html>
