<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multicraft YouTuber Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Multicraft YouTuber Dashboard</h1>
            <p class="subtitle">Top Creators Ranked by Subscriber Count</p>
            <div class="refresh-info">
                <span>Auto-refresh: <strong>60 seconds</strong></span>
                <span id="lastUpdate">Last updated: 1 Day ago</span>
            </div>
        </header>

        <main>
            <div id="dashboard" class="dashboard">
                <!-- YouTubers will be loaded here -->
            </div>
        </main>

        <footer>
            <p>Multicraft YouTuber Dashboard |  <span id="timestamp">--</span></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
